<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AERO-CELESTIAL HUD</title>
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Lexend:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --glow: #00d4ff;
            --accent: #7000ff;
            --text: #e0f2fe;
            --glass: rgba(15, 23, 42, 0.4);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #020617; color: var(--text);
            font-family: 'Lexend', sans-serif; overflow: hidden;
        }

        /* --- STARRY 3D BACKGROUND --- */
        #render-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }

        /* --- UI LAYOUT --- */
        #app { height: 100%; display: flex; flex-direction: column; position: relative; z-index: 10; }
        
        header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(2,6,23,0.8), transparent);
        }
        .logo-box { font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--glow); letter-spacing: 4px; font-size: 0.9rem; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; animation: blurIn 0.5s ease; }
        .page.active { display: block; }

        /* --- GLASSMORPHISM CARDS --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .card-label { 
            font-family: 'Syncopate'; font-size: 0.65rem; color: var(--glow); 
            margin-bottom: 15px; display: flex; align-items: center; gap: 8px; opacity: 0.8;
        }

        /* --- DATA GRID --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-icon { color: var(--glow); font-size: 0.8rem; margin-bottom: 5px; display: block; }
        .stat-val { font-size: 1.1rem; font-weight: 600; display: block; }
        .stat-lab { font-size: 0.6rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }

        /* --- INPUTS & BUTTONS --- */
        .search-bar {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: #fff; font-family: inherit; margin-bottom: 10px;
        }
        .btn-glow {
            background: linear-gradient(45deg, var(--glow), var(--accent));
            color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px;
            font-family: 'Syncopate'; font-weight: 700; font-size: 0.7rem; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        /* --- MAP & NAV --- */
        #map { height: 280px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-btn { color: #64748b; font-size: 1.2rem; transition: 0.3s; padding: 10px; }
        .nav-btn.active { color: var(--glow); transform: translateY(-5px); }

        @keyframes blurIn { from { filter: blur(10px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
    </style>
</head>
<body>

<canvas id="render-canvas"></canvas>

<div id="app">
    <header>
        <div class="logo-box">AERO // CELESTIAL</div>
        <div id="top-clock" style="font-family: 'JetBrains Mono'; font-weight: bold; color: var(--glow);">00:00</div>
    </header>

    <div class="content-area">
        <div id="p-dash" class="page active">
            <div class="glass-card">
                <div class="card-label"><i class="fa-solid fa-satellite"></i> TELEMETRY SYSTEM</div>
                <div class="grid">
                    <div class="stat-box">
                        <i class="fa-solid fa-location-arrow stat-icon"></i>
                        <span id="v-coords" class="stat-val">0.0, 0.0</span>
                        <span class="stat-lab">Coordinates</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-mountain stat-icon"></i>
                        <span id="v-alt" class="stat-val">0 m</span>
                        <span class="stat-lab">Altitude</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-gauge-simple-high stat-icon"></i>
                        <span id="v-spd" class="stat-val">0 km/h</span>
                        <span class="stat-lab">Ground Speed</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-compass stat-icon"></i>
                        <span id="v-hdg" class="stat-val">000°</span>
                        <span class="stat-lab">Heading</span>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-label"><i class="fa-solid fa-cloud-sun"></i> WEATHER STATION</div>
                <div class="grid">
                    <div class="stat-box">
                        <i class="fa-solid fa-temperature-three-quarters stat-icon"></i>
                        <span id="w-temp" class="stat-val">--°C</span>
                        <span class="stat-lab">Ambient Temp</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-droplet stat-icon"></i>
                        <span id="w-hum" class="stat-val">--%</span>
                        <span class="stat-lab">Humidity</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-sun stat-icon"></i>
                        <span id="w-uv" class="stat-val">--</span>
                        <span class="stat-lab">UV Index</span>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-eye stat-icon"></i>
                        <span id="w-vis" class="stat-val">-- km</span>
                        <span class="stat-lab">Visibility</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-nav" class="page">
            <div class="glass-card" style="padding: 8px;"><div id="map"></div></div>
            <div class="glass-card">
                <div class="card-label"><i class="fa-solid fa-radar"></i> AMENITY RADAR</div>
                <input type="text" id="poi-input" class="search-bar" placeholder="Target: toilet, station, food...">
                <button class="btn-glow" onclick="runRadarScan()">INITIALIZE SCAN</button>
                <div id="radar-output" style="margin-top: 15px; font-size: 0.8rem; max-height: 120px; overflow-y: auto;"></div>
            </div>
        </div>

        <div id="p-comm" class="page">
            <div class="glass-card">
                <div class="card-label"><i class="fa-solid fa-bus"></i> TRANSIT MESH (NL)</div>
                <button class="btn-glow" onclick="syncTransit()" style="background: var(--accent);">SYNC LOCAL NODES</button>
                <div id="transit-feed" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="nav('p-dash', this)"><i class="fa-solid fa-house-chimney-window"></i></div>
        <div class="nav-btn" onclick="nav('p-nav', this)"><i class="fa-solid fa-map-marked-alt"></i></div>
        <div class="nav-btn" onclick="nav('p-comm', this)"><i class="fa-solid fa-wifi"></i></div>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, marker, pos = [52.3676, 4.9041];

    // --- 1. 3D CELESTIAL ENGINE (Three.js) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('render-canvas'), antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Starfield
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];
    for(let i=0; i<2000; i++) {
        starCoords.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // Geometric Plane (Icosahedron based)
    const planeGeo = new THREE.IcosahedronGeometry(1.5, 1);
    const planeMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.4 });
    const plane = new THREE.Mesh(planeGeo, planeMat);
    scene.add(plane);
    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        plane.rotation.y += 0.01;
        plane.rotation.z += 0.005;
        stars.rotation.y += 0.0005;
        renderer.render(scene, camera);
    }
    animate();

    // --- 2. CORE LOGIC ---
    setInterval(() => {
        document.getElementById('top-clock').innerText = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }, 1000);

    navigator.geolocation.watchPosition(p => {
        pos = [p.coords.latitude, p.coords.longitude];
        document.getElementById('v-coords').innerText = `${pos[0].toFixed(3)}, ${pos[1].toFixed(3)}`;
        document.getElementById('v-spd').innerText = `${Math.round((p.coords.speed || 0)*3.6)} km/h`;
        document.getElementById('v-alt').innerText = `${Math.round(p.coords.altitude || 0)} m`;
        document.getElementById('v-hdg').innerText = `${Math.round(p.coords.heading || 0)}°`;
        if(!map) initMap(); else marker.setLatLng(pos);
        updateWeather();
    }, null, {enableHighAccuracy: true});

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView(pos, 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        marker = L.circleMarker(pos, {color: '#00d4ff', radius: 8, fillOpacity: 1}).addTo(map);
    }

    async function updateWeather() {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos[0]}&longitude=${pos[1]}&current_weather=true&hourly=relative_humidity_2m,uv_index,visibility`);
        const data = await res.json();
        document.getElementById('w-temp').innerText = `${data.current_weather.temperature}°C`;
        document.getElementById('w-hum').innerText = `${data.hourly.relative_humidity_2m[0]}%`;
        document.getElementById('w-uv').innerText = data.hourly.uv_index[0];
        document.getElementById('w-vis').innerText = `${(data.hourly.visibility[0]/1000).toFixed(1)} km`;
    }

    async function runRadarScan() {
        const val = document.getElementById('poi-input').value || 'toilet';
        const out = document.getElementById('radar-output');
        out.innerHTML = "SCANNING...";
        const url = `https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"~"${val}"](around:1000,${pos[0]},${pos[1]});out;`;
        const res = await fetch(url);
        const data = await res.json();
        out.innerHTML = data.elements.length ? "" : "NO ASSETS DETECTED.";
        data.elements.slice(0, 5).forEach(e => {
            out.innerHTML += `<div style="margin-bottom:5px;">> ${e.tags.name || val.toUpperCase()} [${Math.round(map.distance(pos, [e.lat, e.lon]))}m]</div>`;
        });
    }

    async function syncTransit() {
        const feed = document.getElementById('transit-feed');
        feed.innerHTML = "ESTABLISHING UPLINK...";
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('http://v0.ovapi.nl/nearby/'+pos[0]+'/'+pos[1])}`);
        const raw = await res.json();
        const data = JSON.parse(raw.contents);
        feed.innerHTML = "";
        Object.keys(data).slice(0, 2).forEach(id => {
            const s = data[id];
            feed.innerHTML += `<div style="color:var(--glow); margin-bottom:10px; font-weight:bold;">STATION: ${s.Stop.TimingPointName}</div>`;
            Object.keys(s.Passes).slice(0,3).forEach(pId => {
                const p = s.Passes[pId];
                feed.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
                    <span>${p.LinePublicNumber} ${p.DestinationName50}</span>
                    <span style="color:var(--accent)">${new Date(p.ExpectedDepartureTime).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
                </div>`;
            });
        });
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'p-nav') setTimeout(() => map.invalidateSize(), 200);
    }
</script>
</body>
</html>
